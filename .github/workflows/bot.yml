name: Bluesky Auto Post

on:
 schedule:
  - cron: '0 */3 * * *'

jobs:
 run-bot:
  runs-on: ubuntu-latest

  steps:
  - name: download code
    uses: actions/checkout@v3

  - name: install python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: install tools
    run: pip install -r requirements.txt

  - name: run bot
    run: python bot.py
